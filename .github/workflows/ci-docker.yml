name: ci-docker

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached Daedalus test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: testing/docker/daedalus-examples.Dockerfile
          load: true
          tags: daedalus-examples-test:ci
          cache-from: type=gha,scope=daedalus-examples-test
          cache-to: type=gha,mode=max,scope=daedalus-examples-test

      - name: Run Docker example suite
        env:
          DAEDALUS_SKIP_DOCKER_BUILD: "1"
          DAEDALUS_TEST_IMAGE: daedalus-examples-test:ci
        run: cargo test -p daedalus-rs --test docker_examples -- --ignored --nocapture
