name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  workspace:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run file-size lint
        run: ./scripts/check-file-sizes.sh

      - name: Run workspace tests
        run: cargo test --workspace --all-targets --features "engine,plugins"

      - name: Build examples
        run: cargo check -p daedalus-rs --features "engine,plugins" --examples

      - name: Run example tests
        run: cargo test -p daedalus-rs --features "engine,plugins" --examples

  docs-and-lints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --features "engine,plugins" -- -D warnings

      - name: Build docs
        run: cargo doc --workspace --no-deps

  package-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Validate package surface
        run: cargo package --workspace --allow-dirty --no-verify
